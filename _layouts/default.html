<link rel="manifest" href="/site.webmanifest">
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">

  <!-- CSS из CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Font из CDN -->
  <link href="https://fonts.googleapis.com/css2?family=Linux+Libertine&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Мобильное меню overlay -->
  <div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="toggleMobileMenu()"></div>

  <!-- Верхняя шапка (только мобильная) -->
  <div class="mobile-header">
    <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
    <div class="mobile-search">
      <input type="text" id="mobileSearchInput" placeholder="Поиск статей..." onkeyup="performSearch(this.value)">
    </div>
  </div>

  <!-- Боковая панель -->
  <aside class="sidebar" id="sidebar">
    {% include sidebar.html %}
  </aside>

  <!-- Основной контент -->
  <div class="main-wrapper">
    <!-- Поиск (десктоп) -->
    <div class="desktop-search">
      <input type="text" id="desktopSearchInput" placeholder="Поиск статей..." onkeyup="performSearch(this.value)">
    </div>

    <!-- Результаты поиска -->
    <div id="searchResults" class="search-results" style="display: none;"></div>

    <!-- Контент страницы -->
    <main class="content">
      {{ content }}
    </main>
  </div>

  <!-- JavaScript для поиска и навигации -->
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
